<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boka Ingarö Summer House</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f7f7f7;
            color: #333;
        }

        header {
            background: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Widgeten fyller automatiskt höjden */
        #sb_widget {
            width: 100%;
            min-height: 900px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 14px;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>
    <h1>Boka Ingarö Summer House</h1>
</header>

<div class="container">
    <p>Här kan du se lediga datum och skicka en bokningsförfrågan.</p>

    <!-- ⭐ SimplyBook Widget ⭐ -->
    <div id="sb_widget"></div>

    <script src="https://widget.simplybook.me/v2/widget/widget.js"></script>
    <script>
        var widget = new SimplybookWidget({
            widget_type: "iframe",
            url: "https://siakesingarosummerhouse.simplybook.me",
            theme: "default",
            theme_settings: {
                timeline_hide_unavailable: "1",
                hide_past_days: "0"
            },
            timeline: "modern",
            datepicker: "top_calendar",
            is_rtl: false,
            app_config: {
                allow_switch_to_ada: 0,
                predefined: []
            }
        });
    </script>

    <p>När du skickar en förfrågan får vi ett mail och bekräftar manuellt.</p>
</div>

<footer>
    <p><a href="index.html">← Tillbaka till startsidan</a></p>
</footer>

</body>
</html>
